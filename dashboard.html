<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아차사고 신고 현황</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚨</text></svg>">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        /* 전체 배경 */
        body { font-family: 'Pretendard', sans-serif; background-color: #ffffff; margin: 0; padding: 20px; }
        
        /* 💡 컨테이너 넓이를 최대 1400px로 넓히고 여백을 조정합니다 */
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* 로고 및 제목 */
        .header-section { text-align: center; margin-bottom: 30px; }
        .logo-img { max-width: 150px; margin-bottom: 10px; border-radius: 8px; }
        h1 { color: #1a1a1a; font-size: 26px; margin: 0; font-weight: 800; }
        
        /* 로그인 화면 (로그인 창은 너무 넓어지지 않게 고정) */
        #login-screen { text-align: center; background: #ffffff; padding: 40px 20px; border-radius: 12px; border: 1px solid #eee; margin-top: 10vh; max-width: 400px; margin-left: auto; margin-right: auto; }
        #login-screen input { padding: 12px; font-size: 16px; background: #f4f6f9; border: 1px solid #e1e4e8; border-radius: 8px; width: 250px; text-align: center; margin-bottom: 15px; outline: none; }
        #login-screen input:focus { border-color: #333; }
        #login-screen button { padding: 12px 30px; font-size: 16px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 276px; }
        
        /* 대시보드 화면 및 요약 박스 */
        #dashboard-main { display: none; }
        .summary-box { display: flex; justify-content: space-around; background: #f4f6f9; padding: 20px 10px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .summary-item { text-align: center; font-size: 16px; color: #666; font-weight: 600; width: 33%; border-right: 1px solid #e1e4e8; }
        .summary-item:last-child { border-right: none; }
        .summary-num { display: block; font-size: 32px; font-weight: 800; margin-top: 8px; }
        .num-new { color: #ff4b4b; }
        .num-ing { color: #ff9800; }
        .num-done { color: #4caf50; }

        /* 💡 대시보드 콘텐츠를 '바둑판 배열(Grid)'로 변경 */
        #dashboard-content { 
            display: grid; 
            /* 화면 크기에 맞춰 카드 넓이를 최소 300px로 유지하며 빈 공간을 자동으로 채움 */
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }

        /* 리스트 카드 스타일 */
        .report-card { background: #f4f6f9; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .report-header { display: flex; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #e1e4e8; padding-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .location-badge { background: #333; color: white; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .date-text { color: #888; font-size: 12px; }
        
        /* 상태 뱃지 */
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: bold; color: white; margin-left: auto; }
        .status-접수 { background: #ff4b4b; }
        .status-처리중 { background: #ff9800; }
        .status-완료 { background: #4caf50; }

        .description { font-size: 16px; color: #333; line-height: 1.6; white-space: pre-wrap; flex-grow: 1; }
        .empty-msg { text-align: center; color: #888; padding: 30px; background: #f4f6f9; border-radius: 12px; grid-column: 1 / -1; }
        
        /* 돌아가기 버튼 디자인 */
        .btn-home { display: block; width: 200px; margin: 40px auto 0 auto; text-align: center; background: #fff; color: #333; border: 1px solid #ddd; padding: 12px 0; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.2s; }
        .btn-home:hover { background: #f4f6f9; }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- 🔒 로그인 화면 -->
        <div id="login-screen">
            <img src="logo.jpg" alt="로고" class="logo-img" onerror="this.style.display='none'">
            <h2>🔒 관리자 대시보드</h2>
            <p style="color:#666; font-size:14px; margin-bottom:20px;">비밀번호를 입력해주세요.</p>
            <input type="password" id="pw-input" placeholder="비밀번호" onkeypress="if(event.keyCode==13) checkPassword()">
            <br>
            <button onclick="checkPassword()" id="login-btn">접속하기</button>
        </div>

        <!-- 📊 대시보드 화면 -->
        <div id="dashboard-main">
            <div class="header-section">
                <img src="logo.jpg" alt="로고" class="logo-img" onerror="this.style.display='none'">
                <h1>실시간 아차사고 신고 현황판</h1>
            </div>

            <div class="summary-box">
                <div class="summary-item">접수<span class="summary-num num-new" id="count-new">0</span></div>
                <div class="summary-item">처리중<span class="summary-num num-ing" id="count-ing">0</span></div>
                <div class="summary-item">완료<span class="summary-num num-done" id="count-done">0</span></div>
            </div>

            <div id="dashboard-content">
                <div style="text-align: center; color: #666; padding: 20px; font-weight: bold;">데이터를 불러오는 중입니다... ⏳</div>
            </div>
            
            <a href="index.html" class="btn-home">⬅️ 신고 페이지로 돌아가기</a>
        </div>
    </div>

    <script>
        // 🔴 반드시 사용 중이신 웹앱 URL로 변경해 주세요!
        const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxev7No0cR4LT2zangeNY79zQpi4OP3f-9ujmxWGSbq5VlO3vZCSaCJWjlpeufjMyKT/exec";
        let autoRefreshTimer = null;

        document.addEventListener("DOMContentLoaded", function() {
            const savedPw = localStorage.getItem('dashboard_pw');
            if (savedPw) {
                document.getElementById('pw-input').value = savedPw;
                
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-main').style.display = 'block';
                
                checkPassword(true);
            }
        });

        function checkPassword(isAutoLogin = false) {
            let pw = document.getElementById('pw-input').value;
            if (!pw && isAutoLogin) pw = localStorage.getItem('dashboard_pw');
            
            if (!pw) { 
                alert("비밀번호를 입력해주세요."); 
                return; 
            }

            const loginBtn = document.getElementById('login-btn');
            if (!isAutoLogin) {
                loginBtn.innerText = "확인 중..."; 
                loginBtn.disabled = true;
            }

            // 💡 [핵심] 브라우저가 예전 화면을 띄우지 못하도록 URL 뒤에 현재 시간(난수)을 붙여서 강제로 최신 데이터를 가져옵니다.
            const fetchUrl = WEBAPP_URL + "?pw=" + encodeURIComponent(pw) + "&t=" + new Date().getTime();

            fetch(fetchUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        if (!isAutoLogin) alert("❌ " + data.error);
                        
                        loginBtn.innerText = "접속하기"; loginBtn.disabled = false;
                        document.getElementById('pw-input').value = "";
                        localStorage.removeItem('dashboard_pw');
                        
                        document.getElementById('dashboard-main').style.display = 'none';
                        document.getElementById('login-screen').style.display = 'block';
                        
                        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
                        return;
                    }

                    localStorage.setItem('dashboard_pw', pw);

                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard-main').style.display = 'block';
                    
                    const contentDiv = document.getElementById('dashboard-content');
                    
                    // 💡 통계 변수 초기화 (데이터가 0개일 때도 모두 0으로 덮어씌우기 위함)
                    let countNew = 0, countIng = 0, countDone = 0;
                    
                    if (data.length === 0) {
                        contentDiv.innerHTML = '<div class="empty-msg">아직 접수된 신고가 없습니다. 😊</div>';
                    } else {
                        const html = data.reverse().map(item => {
                            // 💡 [핵심] 구글 시트에 띄어쓰기가 들어갔을 경우를 대비해 모든 공백을 강제로 지우고 검사합니다.
                            const rawStatus = item.status ? item.status.toString().replace(/\s/g, "") : "접수";
                            
                            let displayStatus = "접수";
                            let badgeClass = "status-접수";

                            if (rawStatus.includes("완료")) {
                                countDone++;
                                displayStatus = "완료";
                                badgeClass = "status-완료";
                            } else if (rawStatus.includes("처리중")) {
                                countIng++;
                                displayStatus = "처리중";
                                badgeClass = "status-처리중";
                            } else {
                                countNew++;
                                displayStatus = "접수";
                                badgeClass = "status-접수";
                            }

                            return `
                            <div class="report-card">
                                <div class="report-header">
                                    <span class="location-badge">📍 ${item.location}</span>
                                    <span class="date-text">${item.date}</span>
                                    <span class="status-badge ${badgeClass}">${displayStatus}</span>
                                </div>
                                <div class="description">${item.description}</div>
                            </div>
                            `;
                        }).join('');

                        contentDiv.innerHTML = html;
                    }

                    // 💡 [핵심] 계산된 최종 숫자를 HTML 통계판에 덮어씌웁니다.
                    document.getElementById('count-new').innerText = countNew;
                    document.getElementById('count-ing').innerText = countIng;
                    document.getElementById('count-done').innerText = countDone;

                    if (!autoRefreshTimer) {
                        autoRefreshTimer = setInterval(() => {
                            checkPassword(true);
                        }, 60000); 
                    }
                })
                .catch(error => {
                    if (!isAutoLogin) {
                        alert("⚠️ 데이터를 불러오는 중 오류가 발생했습니다.");
                        loginBtn.innerText = "접속하기"; loginBtn.disabled = false;
                    }
                });
        }
    </script>
</body>
</html>
