<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안전 상황판</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        /* 전체 배경: 순백색 */
        body { font-family: 'Pretendard', sans-serif; background-color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* 로고 및 제목 */
        .header-section { text-align: center; margin-bottom: 20px; }
        .logo-img { max-width: 150px; margin-bottom: 10px; border-radius: 8px; }
        h1 { color: #1a1a1a; font-size: 22px; margin: 0; font-weight: 800; }
        
        /* 🎨 로그인 화면 색상 반전 (박스는 흰색, 입력창은 연회색) */
        #login-screen { text-align: center; background: #ffffff; padding: 40px 20px; border-radius: 12px; border: 1px solid #eee; margin-top: 50px; }
        #login-screen input { padding: 12px; font-size: 16px; background: #f4f6f9; border: 1px solid #e1e4e8; border-radius: 8px; width: 200px; text-align: center; margin-bottom: 15px; outline: none; }
        #login-screen input:focus { border-color: #333; }
        #login-screen button { padding: 12px 30px; font-size: 16px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* 대시보드 화면 및 요약 박스 (연회색) */
        #dashboard-main { display: none; }
        .summary-box { display: flex; justify-content: space-around; background: #f4f6f9; padding: 20px 10px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .summary-item { text-align: center; font-size: 14px; color: #666; font-weight: 600; width: 33%; border-right: 1px solid #e1e4e8; }
        .summary-item:last-child { border-right: none; }
        .summary-num { display: block; font-size: 24px; font-weight: 800; margin-top: 5px; }
        .num-new { color: #ff4b4b; }
        .num-ing { color: #ff9800; }
        .num-done { color: #4caf50; }

        /* 리스트 카드 (연회색) */
        .report-card { background: #f4f6f9; border-radius: 12px; padding: 15px 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .report-header { display: flex; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #e1e4e8; padding-bottom: 8px; flex-wrap: wrap; gap: 8px; }
        .location-badge { background: #333; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .date-text { color: #888; font-size: 12px; }
        
        /* 상태 뱃지 */
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; margin-left: auto; }
        .status-접수 { background: #ff4b4b; }
        .status-처리중 { background: #ff9800; }
        .status-완료 { background: #4caf50; }

        .description { font-size: 15px; color: #333; line-height: 1.5; white-space: pre-wrap; }
        .empty-msg { text-align: center; color: #888; padding: 30px; background: #f4f6f9; border-radius: 12px; }
        .btn-home { display: block; width: 100%; text-align: center; background: #fff; color: #333; border: 1px solid #ddd; padding: 12px 0; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- 🔒 로그인 화면 -->
        <div id="login-screen">
            <img src="logo.jpg" alt="로고" class="logo-img" onerror="this.style.display='none'">
            <h2>🔒 관리자 대시보드</h2>
            <p style="color:#666; font-size:14px; margin-bottom:20px;">비밀번호를 입력해주세요.</p>
            <input type="password" id="pw-input" placeholder="비밀번호" onkeypress="if(event.keyCode==13) checkPassword()">
            <br>
            <button onclick="checkPassword()" id="login-btn">접속하기</button>
        </div>

        <!-- 📊 대시보드 화면 -->
        <div id="dashboard-main">
            <div class="header-section">
                <img src="logo.jpg" alt="로고" class="logo-img" onerror="this.style.display='none'">
                <h1>실시간 아차사고 신고 현황판</h1>
            </div>

            <div class="summary-box">
                <div class="summary-item">접수<span class="summary-num num-new" id="count-new">0</span></div>
                <div class="summary-item">처리중<span class="summary-num num-ing" id="count-ing">0</span></div>
                <div class="summary-item">완료<span class="summary-num num-done" id="count-done">0</span></div>
            </div>

            <div id="dashboard-content">
                <div style="text-align: center; color: #666; padding: 20px; font-weight: bold;">데이터를 불러오는 중입니다... ⏳</div>
            </div>
            
            <a href="index.html" class="btn-home">⬅️ 신고 페이지로 돌아가기</a>
        </div>
    </div>

    <script>
        // 🔴 반드시 사용 중이신 웹앱 URL로 변경해 주세요!
        const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxev7No0cR4LT2zangeNY79zQpi4OP3f-9ujmxWGSbq5VlO3vZCSaCJWjlpeufjMyKT/exec";
        let autoRefreshTimer = null;

        // 💡 페이지 로드 완료 즉시 실행
        document.addEventListener("DOMContentLoaded", function() {
            // sessionStorage 대신 더 강력한 localStorage 사용
            const savedPw = localStorage.getItem('dashboard_pw');
            if (savedPw) {
                document.getElementById('pw-input').value = savedPw;
                
                // 로그인 화면을 아예 숨기고 시작 (깜빡임 방지)
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-main').style.display = 'block';
                
                checkPassword(true);
            }
        });

        function checkPassword(isAutoLogin = false) {
            let pw = document.getElementById('pw-input').value;
            // 입력창이 비어있으면 로컬 스토리지에서 한 번 더 가져옵니다.
            if (!pw && isAutoLogin) pw = localStorage.getItem('dashboard_pw');
            
            if (!pw) { 
                alert("비밀번호를 입력해주세요."); 
                return; 
            }

            const loginBtn = document.getElementById('login-btn');
            if (!isAutoLogin) {
                loginBtn.innerText = "확인 중..."; 
                loginBtn.disabled = true;
            }

            fetch(WEBAPP_URL + "?pw=" + encodeURIComponent(pw))
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        if (!isAutoLogin) alert("❌ " + data.error);
                        
                        // 에러 시 UI 초기화
                        loginBtn.innerText = "접속하기"; loginBtn.disabled = false;
                        document.getElementById('pw-input').value = "";
                        localStorage.removeItem('dashboard_pw');
                        
                        // 자동 로그인 실패 시 로그인 화면 다시 띄우기
                        document.getElementById('dashboard-main').style.display = 'none';
                        document.getElementById('login-screen').style.display = 'block';
                        
                        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
                        return;
                    }

                    // 💡 비밀번호를 내 컴퓨터(브라우저)에 영구 저장
                    localStorage.setItem('dashboard_pw', pw);

                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard-main').style.display = 'block';
                    
                    const contentDiv = document.getElementById('dashboard-content');
                    
                    if (data.length === 0) {
                        contentDiv.innerHTML = '<div class="empty-msg">아직 접수된 신고가 없습니다. 😊</div>';
                    } else {
                        let countNew = 0, countIng = 0, countDone = 0;
                        
                        const html = data.reverse().map(item => {
                            const status = item.status ? item.status.trim() : "접수";
                            if (status === "완료") countDone++;
                            else if (status === "처리중") countIng++;
                            else countNew++;

                            const badgeClass = status === "완료" ? "status-완료" : (status === "처리중" ? "status-처리중" : "status-접수");
                            const displayStatus = status === "완료" || status === "처리중" ? status : "접수";

                            return `
                            <div class="report-card">
                                <div class="report-header">
                                    <span class="location-badge">📍 ${item.location}</span>
                                    <span class="date-text">${item.date}</span>
                                    <span class="status-badge ${badgeClass}">${displayStatus}</span>
                                </div>
                                <div class="description">${item.description}</div>
                            </div>
                            `;
                        }).join('');

                        document.getElementById('count-new').innerText = countNew;
                        document.getElementById('count-ing').innerText = countIng;
                        document.getElementById('count-done').innerText = countDone;
                        contentDiv.innerHTML = html;
                    }

                    // 1분(60초)마다 자동 새로고침 설정
                    if (!autoRefreshTimer) {
                        autoRefreshTimer = setInterval(() => {
                            checkPassword(true);
                        }, 60000); 
                    }
                })
                .catch(error => {
                    if (!isAutoLogin) {
                        alert("⚠️ 데이터를 불러오는 중 오류가 발생했습니다.");
                        loginBtn.innerText = "접속하기"; loginBtn.disabled = false;
                    }
                });
        }
    </script>
</body>
</html>
