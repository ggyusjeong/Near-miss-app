<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아차사고 신고</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚨</text></svg>">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #1a1a1a;
            font-size: 24px;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #666666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        label {
            font-weight: bold;
            font-size: 14px;
            color: #333;
            display: block;
            margin-bottom: 8px;
        }
        .button-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .radio-item input[type="radio"] { display: none; }
        .radio-item label {
            display: block;
            text-align: center;
            padding: 18px 5px;
            background-color: #ffffff;
            border: 2px solid #e1e4e8;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            transition: all 0.2s ease;
        }
        .radio-item input[type="radio"]:checked + label {
            background-color: #ff4b4b;
            color: white;
            border-color: #ff4b4b;
            box-shadow: 0 4px 10px rgba(255, 75, 75, 0.3);
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            resize: none;
            margin-bottom: 25px;
        }
        textarea:focus {
            outline: none;
            border-color: #ff4b4b;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #ff4b4b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 25px;
            transition: background-color 0.2s;
        }
        button:active {
            background-color: #e03e3e;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .info-box {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            border-left: 5px solid #ff4b4b;
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="logo.jpg" style="width: 60%; max-width: 200px; height: auto;">
    </div>

    <h1>아차사고 신고 🚨</h1>
    <div class="subtitle">위험 요소를 알려주세요!</div>

    <form id="reportForm">
        <label style="margin-bottom: 15px;">📍 발견 위치</label>
        <div class="button-group">
            <div class="radio-item"><input type="radio" id="loc1" name="location" value="1층" required><label for="loc1">1층</label></div>
            <div class="radio-item"><input type="radio" id="loc2" name="location" value="2층"><label for="loc2">2층</label></div>
            <div class="radio-item"><input type="radio" id="loc3" name="location" value="3층"><label for="loc3">3층</label></div>
            <div class="radio-item"><input type="radio" id="loc4" name="location" value="4층"><label for="loc4">4층</label></div>
            <div class="radio-item"><input type="radio" id="loc5" name="location" value="별관"><label for="loc5">별관</label></div>
            <div class="radio-item"><input type="radio" id="loc6" name="location" value="지상주차장"><label for="loc6">지상주차장</label></div>
            <div class="radio-item"><input type="radio" id="loc7" name="location" value="지하주차장"><label for="loc7">지하주차장</label></div>
            <div class="radio-item"><input type="radio" id="loc8" name="location" value="외곽"><label for="loc8">외곽</label></div>
            <div class="radio-item"><input type="radio" id="loc9" name="location" value="기타"><label for="loc9">기타</label></div>
        </div>

        <label>📝 어떤 위험 요소가 있나요?</label>
        <textarea name="description" placeholder="예: 벽, 바닥 손상 등, 미끄러짐 위험, 부딪힘 위험 등" required></textarea>

        <button type="submit" id="submitBtn">신고 제출하기</button>
    </form>

    <div class="info-box">
        <b>💡 아차사고(Near Miss)란?</b><br>
        부상이나 질병으로 이어질 뻔했던 아슬아슬한 위험 상황을 뜻합니다. 동일하거나 유사한 위험 요인이 방치될 경우 향후 큰 중대재해로 발전할 수 있으므로, 사전에 위험 요소를 발굴하고 개선하는 것이 무엇보다 중요합니다.
    </div>
    <div style="text-align: center; margin-top: 20px; font-size: 12px; color: #888; line-height: 1.5;">
        🔒 본 신고는 100% 익명으로 접수되며,<br>
        개인을 식별할 수 있는 어떠한 정보도 수집하지 않습니다.
    </div>
</div>

<script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwV4eDFz89GDCnKCaUCVo-tUP8LYNirnuWwotldQXd3p9TNn0bSw0QwaX8IF-QU6fe0/exec";

    function getKSTDateString() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const kst = new Date(utc + (9 * 3600000));
        
        const yyyy = kst.getFullYear();
        const mm = String(kst.getMonth() + 1).padStart(2, '0');
        const dd = String(kst.getDate()).padStart(2, '0');
        const hh = String(kst.getHours()).padStart(2, '0');
        const min = String(kst.getMinutes()).padStart(2, '0');
        const ss = String(kst.getSeconds()).padStart(2, '0');
        
        return `${yyyy}-${mm}-${dd} ${hh}:${min}:${ss}`;
    }

    const form = document.getElementById('reportForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
        e.preventDefault(); 

        submitBtn.innerText = "제출 중입니다...";
        submitBtn.disabled = true;

        const formData = new FormData(form);

        const payload = {
            "date": getKSTDateString(),
            "location": formData.get('location'),
            "description": formData.get('description')
        };

        fetch(WEBAPP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'text/plain;charset=utf-8' 
            },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert("✅ 신고가 접수되었습니다! 안전한 환경을 만드는데 도움주셔서 감사합니다.");
            form.reset(); 
        })
        .catch(error => {
            alert("❌ 전송에 실패했습니다.");
            console.error('Error:', error);
        })
        .finally(() => {
            submitBtn.innerText = "신고 제출하기";
            submitBtn.disabled = false;
        });
    });
</script>

</body>
</html>
