<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아차사고 신고</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚨</text></svg>">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; color: #1a1a1a; font-size: 24px; margin-top: 10px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666666; font-size: 16px; margin-bottom: 30px; }
        label { font-weight: bold; font-size: 14px; color: #333; display: block; margin-bottom: 8px; }
        .button-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .radio-item input[type="radio"] { display: none; }
        .radio-item label {
            display: block; text-align: center; padding: 18px 5px; background-color: #ffffff;
            border: 2px solid #e1e4e8; border-radius: 12px; cursor: pointer;
            font-size: 14px; font-weight: 600; color: #4a5568; transition: all 0.2s ease;
        }
        .radio-item input[type="radio"]:checked + label {
            background-color: #ff4b4b; color: white; border-color: #ff4b4b;
            box-shadow: 0 4px 10px rgba(255, 75, 75, 0.3);
        }
        textarea {
            width: 100%; height: 120px; padding: 15px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 15px; box-sizing: border-box; resize: none; margin-bottom: 15px;
        }
        input[type="file"] {
            width: 100%; padding: 10px; border: 1px dashed #bbb; border-radius: 8px;
            background-color: #f9f9f9; margin-bottom: 25px; font-size: 14px; color: #555; cursor: pointer;
        }
        button {
            width: 100%; padding: 15px; background-color: #ff4b4b; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
            margin-bottom: 25px; transition: background-color 0.2s;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="logo.jpg" style="width: 60%; max-width: 200px; height: auto;">
    </div>

    <h1>아차사고 신고 🚨</h1>
    <div class="subtitle">위험 요소를 알려주세요!</div>

    <form id="reportForm">
        <label style="margin-bottom: 15px;">📍 발견 위치</label>
        <div class="button-group">
            <div class="radio-item"><input type="radio" id="loc1" name="location" value="1층" required><label for="loc1">1층</label></div>
            <div class="radio-item"><input type="radio" id="loc2" name="location" value="2층"><label for="loc2">2층</label></div>
            <div class="radio-item"><input type="radio" id="loc3" name="location" value="3층"><label for="loc3">3층</label></div>
            <div class="radio-item"><input type="radio" id="loc4" name="location" value="4층"><label for="loc4">4층</label></div>
            <div class="radio-item"><input type="radio" id="loc5" name="location" value="별관"><label for="loc5">별관</label></div>
            <div class="radio-item"><input type="radio" id="loc6" name="location" value="지상주차장"><label for="loc6">지상주차장</label></div>
            <div class="radio-item"><input type="radio" id="loc7" name="location" value="지하주차장"><label for="loc7">지하주차장</label></div>
            <div class="radio-item"><input type="radio" id="loc8" name="location" value="외곽"><label for="loc8">외곽</label></div>
            <div class="radio-item"><input type="radio" id="loc9" name="location" value="기타"><label for="loc9">기타</label></div>
        </div>

        <label>📝 어떤 위험 요소가 있나요?</label>
        <textarea name="description" placeholder="예: 벽, 바닥 손상 등, 미끄러짐 위험, 부딪힘 위험 등" required></textarea>

        <label>📸 현장 사진 첨부 (선택)</label>
        <input type="file" id="photo" accept="image/*" capture="environment">

        <button type="submit" id="submitBtn">신고 제출하기</button>
    </form>
</div>

<script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwtLfsFluNE1ngS03QB6ewcNIy3PWoLQCaH1IcWDoQ0JywwZyHSPgDbxVkdQoDtDKfA/exec";

    function getKSTDateString() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const kst = new Date(utc + (9 * 3600000));
        return kst.toISOString().replace('T', ' ').substring(0, 19);
    }

    const form = document.getElementById('reportForm');
    const photoInput = document.getElementById('photo');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "제출 중..."; submitBtn.disabled = true;

        const formData = new FormData(form);
        const payload = {
            "date": getKSTDateString(),
            "location": formData.get('location'),
            "description": formData.get('description'),
            "fileName": "", "mimeType": "", "fileData": ""
        };

        const file = photoInput.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                payload.fileName = file.name;
                payload.mimeType = file.type;
                payload.fileData = event.target.result.split(',')[1];
                sendData(payload);
            };
            reader.readAsDataURL(file);
        } else {
            sendData(payload);
        }
    });

    function sendData(payload) {
        fetch(WEBAPP_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        })
        .then(() => { alert("✅ 신고 완료!"); form.reset(); })
        .finally(() => { 
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "신고 제출하기"; submitBtn.disabled = false; 
        });
    }
</script>
</body>
</html>
